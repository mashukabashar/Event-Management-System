{% extends "base.html" %}
{% block title %}Events{% endblock title %}
{% block content %}

  <div>
    {% if messages %}
    {% for message in messages %}
    
    <div class="px-2 py-1 {% if message.tags == 'success' %}bg-orange-600 text-white font-bold text-md{% endif %}">{{message}}</div>

    {% endfor %}
    {% endif %}
  </div>


    <div class="w-1/2 mx-auto mt-8">
        <p class='font-bold text-2xl'>Event Form</p>

   <form method="POST" class="space-y-5 mb-5">
    {% csrf_token %}
    {{form.as_p}}
    <button type="submit" class="bg-orange-600 hover:bg-orange-700 px-3 py-2 text-white mt-5 rounded-md font-medium">Submit</button>
   </form>

</div>
{% endblock content %}
